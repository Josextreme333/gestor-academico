<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<title>Dashboard</title>
</head>

<body>

<div class="topbar">

    <div>Panel Profesor</div>

    <div class="user-menu">

        <div class="user-btn">
            {{ session['nombre'] }} ▼
        </div>

        <div class="dropdown">
            <a href="/perfil">Editar perfil</a>
            <a href="/logout">Salir</a>
        </div>

    </div>

</div>

<div class="container">

<!-- SUBIR PDF -->
<div class="card" style="max-width:600px;margin-bottom:30px;">

<h3>Subir PDF</h3>

<form method="post" enctype="multipart/form-data" action="/subir_pdf">

    <input name="carrera" placeholder="Carrera" required>
    <input name="materia" placeholder="Materia" required>
    <input name="observaciones" placeholder="Observaciones (opcional)">
    <input type="file" name="pdf" required>

    <button>Subir PDF</button>

</form>

</div>

<h3>Mis archivos</h3>

<div class="grid">

{% for a in archivos %}
<div class="card archivo">

    <div class="materia">Carrera: {{ a['carrera'] }}</div>
    <div class="materia">Materia: {{ a['materia'] }}</div>

    {% if a['observaciones'] %}
    <div class="materia">Obs: {{ a['observaciones'] }}</div>
    {% endif %}

    <div class="fecha">{{ a['fecha'] }}</div>

    <iframe 
        src="/uploads/{{ a['archivo'] }}" 
        width="100%" 
        height="250">
    </iframe>

    <br>

    <div style="display:flex;gap:10px;">

        <a href="/editar_pdf/{{ a['id'] }}">
            <button style="background:#2563eb;">Editar</button>
        </a>

        <a href="/eliminar_pdf/{{ a['id'] }}">
            <button style="background:#dc2626;">Eliminar</button>
        </a>

    </div>

</div>
{% endfor %}

</div>

</div>

</body>
</html>
